services:
  auth_database:
    container_name: auth_database
    image: postgres:16
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - auth_service_database:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  migration:
    container_name: auth_migration
    build: .
    command: bash scripts/migrate.sh
    env_file: .env
    environment:
      POSTGRES_HOST: auth_database
      POSTGRES_PORT: 5432
    depends_on:
      auth_database:
        condition: service_healthy

volumes:
  auth_service_database:
