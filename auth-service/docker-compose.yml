services:
  auth_database:
    container_name: auth_database
    image: postgres:16
    env_file: .env
    shm_size: 128mb
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c max_connections=20
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - auth_service_database:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB' ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  migration:
    container_name: auth_migration
    build: .
    command: bash scripts/migrate.sh
    env_file: .env
    environment:
      POSTGRES_HOST: auth_database
      POSTGRES_PORT: 5432
    depends_on:
      auth_database:
        condition: service_healthy

  app:
    container_name: api
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: auth_database
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    depends_on:
      migration:
        condition: service_completed_successfully

volumes:
  auth_service_database: