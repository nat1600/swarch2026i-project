upstream parla_gateway {
    server api-gateway:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Ocultar info del servidor
    server_tokens off;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Rate limiting
    limit_req zone=api_limit burst=10 nodelay;
    limit_req_status 429;

    # Tamaño máximo de request
    client_max_body_size 1M;

    # Timeouts
    proxy_connect_timeout  5s;
    proxy_read_timeout    15s;
    proxy_send_timeout    10s;

    # Headers de seguridad
    add_header X-Content-Type-Options "nosniff" always;

    # Bloquear métodos no permitidos
    if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH|OPTIONS)$) {
        return 405;
    }

    # Bloquear rutas internas
    location ~ ^/(metrics|debug) {
        deny all;
        return 403;
    }

    location / {
        # Preflight CORS
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://parla_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin  "*"                                      always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type"            always;
        add_header X-Content-Type-Options       "nosniff"                                always;
    }
}