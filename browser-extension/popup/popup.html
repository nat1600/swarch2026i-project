<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parla</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="main">

    <!-- HEADER -->
    <div class="main-header">
      <div class="header-info">
        <h2 class="header-title"> Parla</h2>
        <label class="toggle-switch-mini">
          <input type="checkbox" id="extension-toggle" checked>
          <span class="toggle-slider-small"></span>
        </label>
      </div>
      <span class="toggle-status" id="toggle-status">Activa</span>
    </div>

    <!-- TUTORIAL -->
    <div class="tutorial-area">
      <div class="tutorial-content">
        <div class="tutorial-icon">
          <img src="../assets/icons/chiguirohesitating.png" alt="Parla" class="tutorial-img">
        </div>
        <h3>¿CÓMO USAR PARLA?</h3>
        <div class="tutorial-steps">
          <div class="step">
            <span class="step-number">1</span>
            <p>Selecciona cualquier texto en una página web</p>
          </div>
          <div class="step">
            <span class="step-number">2</span>
            <p>Verás la traducción instantánea</p>
          </div>
          <div class="step">
            <span class="step-number">3</span>
            <p>Guarda las frases que quieras recordar</p>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM TABS -->
    <div class="bottom-tabs">

      <!-- Saved Phrases Tab -->
      <div class="collapsible-tab">
        <button class="tab-trigger" data-tab="saved">
          <div class="tab-trigger-left">
            <i class="bi bi-bookmark-fill"></i>
            <span>Guardadas</span>
          </div>
          <div class="tab-trigger-right">
            <span class="badge" id="saved-count">0</span>
            <i class="bi bi-chevron-down tab-arrow"></i>
          </div>
        </button>
        <div class="tab-collapse" id="saved-collapse">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="search-input" placeholder="Buscar frases...">
          </div>
          <div id="phrases-container">
            <div class="empty-state">
              <i class="bi bi-bookmark"></i>
              <h3>No hay frases guardadas</h3>
              <p>Selecciona texto en cualquier página y guárdalo para empezar.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Settings Tab -->
      <div class="collapsible-tab">
        <button class="tab-trigger" data-tab="settings">
          <div class="tab-trigger-left">
            <i class="bi bi-gear-fill"></i>
            <span>Ajustes</span>
          </div>
          <div class="tab-trigger-right">
            <i class="bi bi-chevron-down tab-arrow"></i>
          </div>
        </button>
        <div class="tab-collapse" id="settings-collapse">
          <div class="settings-section">
            <h3><i class="bi bi-sliders"></i> Funciones</h3>
            <label class="switch-label">
              <input type="checkbox" class="switch-input" id="auto-pause" checked>
              <span class="switch-slider-setting"></span>
              <span>Auto-pausar video</span>
            </label>
            <label class="switch-label">
              <input type="checkbox" class="switch-input" id="show-pronunciation" checked>
              <span class="switch-slider-setting"></span>
              <span>Mostrar pronunciación</span>
            </label>
          </div>
          <div class="settings-footer">
            <img src="../assets/icons/chiguiro.png" alt="Parla" class="footer-mascot">
            <p class="footer-version">Parla v1.0.0</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="../config/config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
