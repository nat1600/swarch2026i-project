<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parla</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="main">

    <!-- HEADER -->
    <div class="main-header">
      <div class="header-top">
        <div class="header-logo-area">
          <!-- SVG mascot emblem -->
          <div class="mascot-emblem">
            <div class="emblem-ring emblem-ring--outer"></div>
            <div class="emblem-ring emblem-ring--inner"></div>
            <img src="../assets/icons/chiguiro.png" alt="Parla" class="emblem-img">
          </div>
          <div class="header-brand">
            <h2 class="header-title">Parla</h2>
            <span class="header-tagline">tu compañero de idiomas</span>
          </div>
        </div>
        <div class="header-controls">
          <label class="toggle-switch-mini">
            <input type="checkbox" id="extension-toggle" checked>
            <span class="toggle-slider-small"></span>
          </label>
          <span class="toggle-status" id="toggle-status">Activa</span>
        </div>
      </div>
    </div>

    <!-- AUTH STATUS -->
    <div class="auth-banner" id="auth-banner">
      <div class="auth-status auth-loggedout" id="auth-loggedout">
        <i class="bi bi-shield-lock"></i>
        <span>Inicia sesión para sincronizar</span>
        <button class="auth-btn auth-btn--login" id="btn-login">Entrar</button>
      </div>
      <div class="auth-status auth-loggedin" id="auth-loggedin" style="display:none">
        <i class="bi bi-shield-check"></i>
        <span>Sesión activa</span>
        <button class="auth-btn auth-btn--logout" id="btn-logout">Salir</button>
      </div>
      <p class="auth-error" id="auth-error" style="display:none"></p>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="quick-actions-area">
      <p class="quick-actions-label">¿Qué quieres hacer?</p>
      <div class="quick-actions-grid">

        <button class="action-card" id="btn-practice">
          <div class="action-icon-wrap action-icon-wrap--practice">
            <i class="bi bi-lightning-charge-fill"></i>
          </div>
          <span class="action-label">Practicar</span>
        </button>

        <button class="action-card" id="btn-stats">
          <div class="action-icon-wrap action-icon-wrap--stats">
            <i class="bi bi-bar-chart-fill"></i>
          </div>
          <span class="action-label">Estadísticas</span>
        </button>

        <button class="action-card" id="btn-share">
          <div class="action-icon-wrap action-icon-wrap--share">
            <i class="bi bi-trophy-fill"></i>
          </div>
          <span class="action-label">Logros</span>
        </button>

        <button class="action-card" id="btn-landing">
          <div class="action-icon-wrap action-icon-wrap--landing">
            <i class="bi bi-house-heart-fill"></i>
          </div>
          <span class="action-label">Inicio</span>
        </button>

      </div>
    </div>

    <!-- TUTORIAL -->
    <div class="tutorial-area">
      <div class="tutorial-content">
        <h3>¿CÓMO USAR PARLA?</h3>
        <div class="tutorial-steps">
          <div class="step">
            <span class="step-number">1</span>
            <p>Selecciona cualquier texto en una página web</p>
          </div>
          <div class="step">
            <span class="step-number">2</span>
            <p>Verás la traducción instantánea</p>
          </div>
          <div class="step">
            <span class="step-number">3</span>
            <p>Guarda las frases que quieras recordar</p>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM TABS -->
    <div class="bottom-tabs">

      <!-- Saved Phrases Tab -->
      <div class="collapsible-tab">
        <button class="tab-trigger" data-tab="saved">
          
          
        </button>
      
            
      </div>

      <!-- Settings Tab -->
      <div class="collapsible-tab">
        <button class="tab-trigger" data-tab="settings">
          <div class="tab-trigger-left">
            <i class="bi bi-gear-fill"></i>
            <span>Ajustes</span>
          </div>
          <div class="tab-trigger-right">
            <i class="bi bi-chevron-down tab-arrow"></i>
          </div>
        </button>
        <div class="tab-collapse" id="settings-collapse">
          <div class="settings-section">
            <h3><i class="bi bi-sliders"></i> Funciones</h3>
            <label class="switch-label">
              <input type="checkbox" class="switch-input" id="auto-pause" checked>
              <span class="switch-slider-setting"></span>
              <span>Auto-pausar video</span>
            </label>
            <label class="switch-label">
              <input type="checkbox" class="switch-input" id="show-pronunciation" checked>
              <span class="switch-slider-setting"></span>
              <span>Mostrar pronunciación</span>
            </label>
          </div>
          <div class="settings-footer">
            <img src="../assets/icons/chiguiro.png" alt="Parla" class="footer-mascot">
            <p class="footer-version">Parla v1.0.0</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="../config/config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
