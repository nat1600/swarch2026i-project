services:
  # ─── DATABASES ─────────────────────────────────────────────────────────────
  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    container_name: mongo
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - forum_mongo_database:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── DB MIGRATIONS / SEEDERS ───────────────────────────────────────────────
  auth_migration:
    container_name: auth_migration
    build: ./auth-service/
    command: bash scripts/migrate.sh
    env_file:
      - ./auth-service/.env
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy

  core_migration:
    container_name: core_migration
    build: ./core-service/
    command: bash scripts/migrate.sh
    env_file:
      - ./core-service/.env
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: core_db
    depends_on:
      postgres:
        condition: service_healthy

  forum_seed:
    container_name: forum_seed
    build: ./forum-service/api/
    command: python -m scripts.seed_categories
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: forum_db
      ATLAS_USER: dummy
      ATLAS_PASS: dummy
      ATLAS_CLUSTER: dummy
    depends_on:
      mongo:
        condition: service_healthy

  # ─── API GATEWAY ────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./api-gateway/.env
    environment:
      SERVICE_AUTH_URL: http://auth-service:8000
      SERVICE_CORE_URL: http://core-service:8000
      SERVICE_FORUM_URL: http://forum-service:8003
      SERVICE_GAME_URL: http://gamification-service:8080
    depends_on:
      - auth-service
      - core-service
      - forum-service
#      - gamification-service

  # ─── BACKEND MICROSERVICES ──────────────────────────────────────────────────
  auth-service:
    container_name: auth-service
    build: ./auth-service
    env_file:
      - ./auth-service/.env
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
      auth_migration:
        condition: service_completed_successfully

  core-service:
    build: ./core-service
    container_name: core-service
    env_file:
      - ./core-service/.env
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: core_db
    depends_on:
      postgres:
        condition: service_healthy
      core_migration:
        condition: service_completed_successfully

  forum-service:
    build: ./forum-service/api
    container_name: forum-service
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: forum_db
      ATLAS_USER: dummy
      ATLAS_PASS: dummy
      ATLAS_CLUSTER: dummy
    depends_on:
      mongo:
        condition: service_healthy
      forum_seed:
        condition: service_completed_successfully

#  gamification-service:
#    build: ./gamification-service/GamificationService
#    container_name: gamification-service
#    environment:
#      LOCAL_DB_URL: jdbc:postgresql://postgres:5432/gamification_db
#      LOCAL_DB_USERNAME: root
#      LOCAL_DB_PASSWORD: password
#      JPA_DDL_AUTO: update
#      JPA_SHOW_SQL: "true"
#      REDIS_HOST: redis
#      REDIS_PORT: 6379
#    depends_on:
#      postgres:
#        condition: service_healthy
#      redis:
#        condition: service_healthy

  # ─── FRONTEND WEB APP ───────────────────────────────────────────────────────
  web-app:
    build: ./web-app/parla
    container_name: web-app
    ports:
      - "3000:3000"
    env_file: ./web-app/parla/.env
    environment:
      SERVER_AUTH_URL: http://api-gateway:8080/api/auth
      SERVER_CORE_URL: http://api-gateway:8080/api/core
      SERVER_GRAPHQL_URL: http://api-gateway:8080/api/auth/graphql
      SERVER_FORUM_URL: http://api-gateway:8080/api/forum
      SERVER_GAME_URL: http://api-gateway:8080/api/game
      SERVER_GAMIFICATION_URL: http://api-gateway:8080/api/gamification
    depends_on:
      - api-gateway
      - redis
volumes:
  postgres_data:
  forum_mongo_database:
