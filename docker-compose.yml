services:
  # ─── DATABASES ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API GATEWAY ────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVICES_AUTH_URL: http://auth-service:8000
      SERVICES_CORE_URL: http://core-service:8000
      SERVICES_FORUM_URL: http://forum-service:8003
      SERVICES_GAME_URL: http://gamification-service:8080
      auth0.domain: dev-pzxsxsfqc2je00n4.us.auth0.com
      auth0.audience: https://parla.com
    depends_on:
      - auth-service
      - core-service
      - forum-service
      - gamification-service

  # ─── BACKEND MICROSERVICES ──────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
      AUTH0_DOMAIN: dev-pzxsxsfqc2je00n4.us.auth0.com
      AUTH0_API_AUDIENCE: https://parla.com
      DEBUG: "true"
      CORS_ORIGINS: "http://localhost:3000,http://web-app:3000"
    depends_on:
      postgres:
        condition: service_healthy

  core-service:
    build: ./core-service
    container_name: core-service
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy

  forum-service:
    build: ./forum-service/api
    container_name: forum-service
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: forum_db
    depends_on:
      mongo:
        condition: service_healthy

  gamification-service:
    build: ./gamification-service/GamificationService
    container_name: gamification-service
    environment:
      LOCAL_DB_URL: jdbc:postgresql://postgres:5432/gamification_db
      LOCAL_DB_USERNAME: root
      LOCAL_DB_PASSWORD: password
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "true"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── FRONTEND WEB APP ───────────────────────────────────────────────────────
  web-app:
    build: ./web-app/parla
    container_name: web-app
    ports:
      - "3000:3000"
    env_file: ./web-app/parla/.env
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  mongo_data:
