services:

  # ── Auth DB ───────────────────────────────────────────────────────────────────
  auth_database:
    container_name: auth_database
    image: postgres:16
    env_file: auth-service/.env
    shm_size: 128mb
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c max_connections=20
    ports:
      - "5433:5432"
    volumes:
      - auth_service_database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Auth Migrations ───────────────────────────────────────────────────────────
  auth_migration:
    container_name: auth_migration
    build: auth-service/
    command: bash scripts/migrate.sh
    env_file: auth-service/.env
    environment:
      POSTGRES_HOST: auth_database
      POSTGRES_PORT: 5432
    depends_on:
      auth_database:
        condition: service_healthy

  # ── Auth Service ──────────────────────────────────────────────────────────────
  auth_service:
    container_name: auth_service
    build: auth-service/
    env_file: auth-service/.env
    environment:
      POSTGRES_HOST: auth_database
      POSTGRES_PORT: 5432
    volumes:
      - ./auth-service/app:/app/app
    networks:
      default:
        aliases:
          - auth-service
    depends_on:
      auth_migration:
        condition: service_completed_successfully

  # ── Core DB ───────────────────────────────────────────────────────────────────
  core_database:
    container_name: core_database
    image: postgres:16
    env_file: core-service/.env
    ports:
      - "5434:5432"
    volumes:
      - core_service_database:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Core Mongo ────────────────────────────────────────────────────────────────
  core_mongo:
    container_name: core_mongo
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - core_mongo_database:/data/db
    healthcheck:
      test: ['CMD-SHELL', 'mongosh --eval "db.adminCommand(\"ping\")" --quiet']
      interval: 5m
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Core Migrations ───────────────────────────────────────────────────────────
  core_migration:
    container_name: core_migration
    build: core-service/
    command: bash scripts/migrate.sh
    env_file: core-service/.env
    environment:
      POSTGRES_HOST: core_database
      POSTGRES_PORT: 5432
    depends_on:
      core_database:
        condition: service_healthy

  # ── Core Service ──────────────────────────────────────────────────────────────
  core_service:
    container_name: core_service
    build: core-service/
    env_file: core-service/.env
    environment:
      POSTGRES_HOST: core_database
      POSTGRES_PORT: 5432
      MONGO_URL: mongodb://core_mongo:27017
    ports:
      - "8000:8000"
    networks:
      default:
        aliases:
          - core-service
    depends_on:
      core_database:
        condition: service_healthy
      core_mongo:
        condition: service_healthy
      core_migration:
        condition: service_completed_successfully

  # ── API Gateway ───────────────────────────────────────────────────────────────
  api_gateway:
    container_name: api_gateway
    build: api-gateway/
    env_file: api-gateway/.env
    ports:
      - "8080:8080"
    depends_on:
      - auth_service
      - core_service

  # ── Web App ───────────────────────────────────────────────────────────────────
  web_app:
    container_name: web_app
    build: web-app/parla/
    env_file: web-app/parla/.env
    ports:
      - "3000:3000"
    depends_on:
      - api_gateway

volumes:
  auth_service_database:
  core_service_database:
  core_mongo_database:
