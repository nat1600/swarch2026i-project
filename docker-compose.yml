services:
  # ─── DATABASES ─────────────────────────────────────────────────────────────
  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      start_period: 30s
      start_interval: 2s
      interval: 30s
      timeout: 3s
      retries: 5

  mongo:
    container_name: mongo
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - forum_mongo_database:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      start_period: 10s
      start_interval: 2s
      interval: 30s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 10s
      start_interval: 2s
      interval: 30s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      start_period: 30s
      start_interval: 2s
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ─── DB MIGRATIONS / SEEDERS ───────────────────────────────────────────────
  auth_migration:
    container_name: auth_migration
    build: ./auth-service/
    command: bash scripts/migrate.sh
    env_file:
      - ./auth-service/.env
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy

  core_migration:
    container_name: core_migration
    build: ./core-service/
    command: bash scripts/migrate.sh
    env_file:
      - ./core-service/.env
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
      MONGO_URL: mongodb://mongo:27018
      MONGO_DB: core_db
    depends_on:
      postgres:
        condition: service_healthy

  payment_migration:
    container_name: payment_migration
    build: ./payment-service/
    command: bash scripts/migrate.sh
    env_file:
      - ./payment-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://root:password@postgres:5432/payment_db
    depends_on:
      postgres:
        condition: service_healthy

  forum_seed:
    container_name: forum_seed
    build: ./forum-service/api/
    command: python -m scripts.seed_categories
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: forum_db
      ATLAS_USER: dummy
      ATLAS_PASS: dummy
      ATLAS_CLUSTER: dummy
    depends_on:
      mongo:
        condition: service_healthy

  # ─── API GATEWAY ────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    env_file:
      - ./api-gateway/.env
    environment:
      PORT: 8080
      ALLOWED_ORIGINS: https://localhost
      SERVICE_AUTH_URL: http://auth-service:8000
      SERVICE_CORE_URL: http://core-service:8000
      SERVICE_FORUM_URL: http://forum-service:8003
      SERVICE_GAME_URL: http://gamification-service:8080
      SERVICE_PAYMENT_URL: http://payment-service:8005
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      start_period: 10s
      start_interval: 2s
      interval: 30s
      timeout: 3s
      retries: 5
    depends_on:
      auth-service:
        condition: service_healthy
      core-service:
        condition: service_healthy
      forum-service:
        condition: service_healthy

  # ─── BACKEND MICROSERVICES ──────────────────────────────────────────────────
  auth-service:
    container_name: auth-service
    build: ./auth-service
    env_file:
      - ./auth-service/.env
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
      DEBUG: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      start_period: 10s
      start_interval: 2s
      interval: 30s
      timeout: 3s
      retries: 5
    depends_on:
      auth_migration:
        condition: service_completed_successfully

  core-service:
    build: ./core-service
    container_name: core-service
    env_file:
      - ./core-service/.env
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: core_db
      DEBUG: "true"
      LIBRETRANSLATE_URL: "https://libretranslate.com"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      start_period: 10s
      start_interval: 2s
      interval: 30s
      timeout: 3s
      retries: 5
    depends_on:
      core_migration:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy

  forum-service:
    build: ./forum-service/api
    container_name: forum-service
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: forum_db
      ATLAS_USER: dummy
      ATLAS_PASS: dummy
      ATLAS_CLUSTER: dummy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      start_period: 10s
      start_interval: 2s
      interval: 30s
      timeout: 3s
      retries: 5
    depends_on:
      forum_seed:
        condition: service_completed_successfully

