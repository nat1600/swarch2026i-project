services:
  # ─── DATABASES ─────────────────────────────────────────────────────────────
  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    container_name: mongo
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - forum_mongo_database:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15673"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── DB MIGRATIONS / SEEDERS ───────────────────────────────────────────────
  auth_migration:
    container_name: auth_migration
    build: ./auth-service/
    command: bash scripts/migrate.sh
    env_file:
      - ./auth-service/.env
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy

  core_migration:
    container_name: core_migration
    build: ./core-service/
    command: bash scripts/migrate.sh
    env_file:
      - ./core-service/.env
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
      MONGO_URL: mongodb://mongo:27018
      MONGO_DB: core_db
    depends_on:
      postgres:
        condition: service_healthy

  payment_migration:
    container_name: payment_migration
    build: ./payment-service/
    command: bash scripts/migrate.sh
    env_file:
      - ./payment-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://root:password@postgres:5432/payment_db
    depends_on:
      postgres:
        condition: service_healthy

  forum_seed:
    container_name: forum_seed
    build: ./forum-service/api/
    command: python -m scripts.seed_categories
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: forum_db
      ATLAS_USER: dummy
      ATLAS_PASS: dummy
      ATLAS_CLUSTER: dummy
    depends_on:
      mongo:
        condition: service_healthy

  # ─── REVERSE PROXY (Nginx) ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api-gateway

  # ─── API GATEWAY ────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    # Port NOT exposed to the host — only reachable by Nginx inside Docker network
    env_file:
      - ./api-gateway/.env
   
    environment:
      SERVICE_AUTH_URL: http://auth-service:8000
      SERVICE_CORE_URL: http://core-service:8000
      SERVICE_FORUM_URL: http://forum-service:8003
      SERVICE_GAME_URL: http://gamification-service:8080
      SERVICE_PAYMENT_URL: http://payment-service:8005
    depends_on:
      - auth-service
      - core-service
      - forum-service
#      - gamification-service

  # ─── BACKEND MICROSERVICES ──────────────────────────────────────────────────
  auth-service:
    container_name: auth-service
    build: ./auth-service
    env_file:
      - ./auth-service/.env
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
      auth_migration:
        condition: service_completed_successfully

  core-service:
    build: ./core-service
    container_name: core-service
    env_file:
      - ./core-service/.env
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: root
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: core_db
      DEBUG: "true"
      DEEPL_API_KEY: "dummy"
      LIBRETRANSLATE_URL: "https://libretranslate.com"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq/
    depends_on:
      postgres:
        condition: service_healthy
      core_migration:
        condition: service_completed_successfully

  forum-service:
    build: ./forum-service/api
    container_name: forum-service
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: forum_db
      ATLAS_USER: dummy
      ATLAS_PASS: dummy
      ATLAS_CLUSTER: dummy
    depends_on:
      mongo:
        condition: service_healthy
      forum_seed:
        condition: service_completed_successfully

  payment-service:
    build: ./payment-service
    container_name: payment-service
    env_file:
      - ./payment-service/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://root:password@postgres:5432/payment_db
      # MERCADOPAGO_ACCESS_TOKEN, MERCADOPAGO_PUBLIC_KEY and JWT_SECRET are
      # provided via the service env_file (payment-service/.env). Avoid using
      # ${VAR} interpolation here so Compose does not require them in the host
      # environment and the file values are used inside the container.
      AUTH_SERVICE_URL: http://auth-service:8000
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      payment_migration:
        condition: service_completed_successfully

#  gamification-service:
#    build: ./gamification-service/GamificationService
#    container_name: gamification-service
#    environment:
#      LOCAL_DB_URL: jdbc:postgresql://postgres:5432/gamification_db
#      LOCAL_DB_USERNAME: root
#      LOCAL_DB_PASSWORD: password
#      JPA_DDL_AUTO: update
#      JPA_SHOW_SQL: "true"
#      REDIS_HOST: redis
#      REDIS_PORT: 6379
#    depends_on:
#      postgres:
#        condition: service_healthy
#      redis:
#        condition: service_healthy



  enrichment-service:
    build: ./enrichment-service
    container_name: enrichment-service
    env_file: ./enrichment-service/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
        
  # ─── FRONTEND WEB APP ───────────────────────────────────────────────────────
  web-app:
    build: ./web-app/parla
    container_name: web-app
    ports:
      - "3000:3000"
  
    env_file: ./web-app/parla/.env
    environment:
      SERVER_AUTH_URL: https://nginx/api/auth
      SERVER_CORE_URL: https://nginx/api/core
      SERVER_GRAPHQL_URL: https://nginx/api/auth/graphql
      SERVER_FORUM_URL: https://nginx/api/forum
      SERVER_GAME_URL: https://nginx/api/game
      SERVER_GAMIFICATION_URL: https://nginx/api/gamification
      SERVER_PAYMENT_URL: https://nginx/api/payments
    depends_on:
      - api-gateway
      - redis
volumes:
  postgres_data:
  forum_mongo_database: