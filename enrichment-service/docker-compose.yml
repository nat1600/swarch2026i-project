services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"  # UI en http://localhost:15672

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  enrichment-service:
    build: .
    env_file: .env
    depends_on:
      - rabbitmq
      - mongodb