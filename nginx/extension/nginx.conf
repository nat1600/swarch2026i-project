worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # ─── Log Formatting ─────────────────────────────────────────────────
    log_format proxy_log '$remote_addr - [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     'upstream=$upstream_addr '
                     'upstream_status=$upstream_status '
                     'upstream_time=$upstream_response_time '
                     'request_time=$request_time';

    # ─── RATE LIMITING ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:5m      rate=10r/s;
    limit_req_status 429;  # 429 Too Many Requests, by default is 503 Service Unavailable

    # ── UPSTREAMS ───────────────────────────────────────────────────────
    upstream api_gateway {
        server api-gateway:8080;
        keepalive 16;
    }

    # ── SERVERS ─────────────────────────────────────────────────────────
    # Drop anything with an unrecognized Host
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;
        return 444;
    }

    # Redirect to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        # SSL keys
        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        # TLS hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # SSL session caching
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # 1 year
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # Timeouts to avoid hanging connections
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Shared proxy settings
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;

        access_log /var/log/nginx/access.log proxy_log;

        # ─── LOGIC FORWARDING REQUESTS ──────────────────────────────────
        # ─── /api/core (microservice) ───────────────────────────────────
        location /api/core/ {
            if ($request_method !~ ^(GET|POST|PUT|DELETE)$) {
                return 405;
            }
            proxy_pass http://api_gateway;
            limit_req zone=api burst=20 nodelay;
        }
    }
}