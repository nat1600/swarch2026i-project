worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ─── RATE LIMITING (zonas) ────────────────────────────────────────────
    # Cada zona reserva memoria para rastrear IPs ($binary_remote_addr ≈ 7 bytes/IP)
    limit_req_zone $binary_remote_addr zone=graphql:10m  rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=20r/s;
    limit_req_zone $binary_remote_addr zone=web:10m      rate=30r/s;

    # Respuesta cuando se supera el límite (por defecto es 503)
    limit_req_status 429;

    # ─── CACHÉ ───────────────────────────────────────────────────────────
    # levels=1:2 → estructura de directorios en disco
    # keys_zone=static:10m → 10 MB de índice en RAM (~80k claves)
    # max_size=1g → límite de disco
    # inactive=60m → expulsa entradas sin uso en 60 min
    proxy_cache_path /var/cache/nginx levels=1:2
                     keys_zone=static:10m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    upstream api_gateway {
        server api-gateway:8080;
    }

    upstream web_app {
        server web-app:3000;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        proxy_buffer_size        128k;
        proxy_buffers            4 256k;
        proxy_busy_buffers_size  256k;

        # ─── /api/auth/graphql ──────────────────────────────────────────
        location = /api/auth/graphql {
            # burst=10: permite hasta 10 requests en cola antes de rechazar
            # nodelay: los del burst no esperan, se procesan de inmediato
            limit_req zone=graphql burst=10 nodelay;

            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
        }

        # ─── /api/auth/ (Auth0 SDK) ─────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=20 nodelay;

            proxy_pass http://web_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
        }

        # ─── /api/ (microservicios) ─────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=40 nodelay;

            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
        }

        # ─── / (Next.js app) ────────────────────────────────────────────
        location / {
            limit_req zone=web burst=60 nodelay;

            # Caché solo para assets estáticos de Next.js
            # Los HTML dinámicos NO deben cachearse aquí
            proxy_cache static;
            proxy_cache_valid 200 1m;
            proxy_cache_valid 404 10s;

            # Sirve caché aunque el backend esté caído (stale)
            proxy_cache_use_stale error timeout updating
                                   http_500 http_502 http_503 http_504;

            # Evita que múltiples requests simultáneos rompan el caché
            proxy_cache_lock on;

            # Agrega header para saber si el response viene del caché
            add_header X-Cache-Status $upstream_cache_status;

            # No cachear si hay cookies de sesión o auth
            proxy_no_cache $cookie_session $cookie_appSession;
            proxy_cache_bypass $cookie_session $cookie_appSession;

            proxy_pass http://web_app;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}