worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # ─── Log Formatting ─────────────────────────────────────────────────
    log_format proxy_log '$remote_addr - [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     'upstream=$upstream_addr '
                     'upstream_status=$upstream_status '
                     'upstream_time=$upstream_response_time '
                     'request_time=$request_time';

    # ─── RATE LIMITING ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=20r/s;
    limit_req_zone $binary_remote_addr zone=web:10m      rate=30r/s;
    limit_req_zone $binary_remote_addr zone=graphql:10m  rate=5r/s;
    limit_req_status 429;

    # ─── CACHÉ ───────────────────────────────────────────────────────────
    # levels=1:2 → estructura de directorios en disco
    # keys_zone=static:10m → 10 MB de índice en RAM (~80k claves)
    # max_size=1g → límite de disco
    # inactive=60m → expulsa entradas sin uso en 60 min
    proxy_cache_path /var/cache/nginx levels=1:2
                     keys_zone=static:10m
                     max_size=1g
                     inactive=60m
                     use_temp_path=off;

    # ── UPSTREAMS ───────────────────────────────────────────────────────
    upstream web_app {
        server web-app:3000;
        keepalive 8;
    }

    # ── SERVERS ─────────────────────────────────────────────────────────
    # Drop anything with an unrecognized Host
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;
        return 444;
    }

    # Redirect to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        # SSL keys
        ssl_certificate /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;

        # TLS hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        # SSL session caching
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # Security headers
        include /etc/nginx/snippets/security-headers.conf;

        # Timeouts to avoid hanging connections
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Buffering for large responses (e.g. GraphQL queries)
        proxy_buffer_size        128k;
        proxy_buffers            4 256k;
        proxy_busy_buffers_size  256k;

        # Shared proxy settings
        proxy_http_version 1.1;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        access_log /var/log/nginx/access.log proxy_log;

        # ─── LOGIC FORWARDING REQUESTS ──────────────────────────────────

        # ─── /api/auth/graphql ──────────────────────────────────────────
        location = /api/auth/graphql {
            proxy_pass http://web_app;
            limit_req zone=graphql burst=10 nodelay;
        }

        # ─── /api/auth/ (Auth0 SDK) ─────────────────────────────────────
        location /api/auth/ {
            proxy_pass http://web_app;
            limit_req zone=auth burst=20 nodelay;
        }

        # ─── /api/ (microservicios via web-app) ─────────────────────────
        location /api/ {
            proxy_pass http://web_app;
            limit_req zone=api burst=40 nodelay;
        }

        # ─── / (Next.js static cache) ─────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://web_app;
            limit_req zone=web burst=60 nodelay;

            # Caché solo para assets estáticos de Next.js
            # Los HTML dinámicos NO deben cachearse aquí
            proxy_cache static;
            proxy_cache_valid 200 30m;
            proxy_cache_valid 404 10s;

            # Sirve caché aunque el backend esté caído (stale)
            proxy_cache_use_stale error timeout updating
                                   http_500 http_502 http_503 http_504;

            # Evita que múltiples requests simultáneos rompan el caché
            proxy_cache_lock on;

            # Agrega header para saber si el response viene del caché
            include /etc/nginx/snippets/security-headers.conf;
            add_header X-Cache-Status $upstream_cache_status;

            # No cachear si hay cookies de sesión o auth
            proxy_no_cache $cookie_session $cookie_appSession $http_authorization;
            proxy_cache_bypass $cookie_session $cookie_appSession $http_authorization;
        }

        # ─── / (Next.js app) ────────────────────────────────────────────
        location / {
            proxy_pass http://web_app;
            limit_req zone=web burst=60 nodelay;
        }
    }
}