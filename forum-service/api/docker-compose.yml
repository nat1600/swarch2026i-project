services:
  forum-service:
    build: .
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME}
    
    container_name: forum

    depends_on:
      mongo:
        condition: service_healthy # <--- 2. Espera a que el healthcheck pase
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    container_name: mongo

    restart: unless-stopped
    # 1. Agregamos un healthcheck para saber cuándo Mongo está realmente listo
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data: