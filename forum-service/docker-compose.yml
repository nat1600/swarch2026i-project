services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    container_name: mongo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  forum-api:
    build: ./api
    ports:
      - "8003:8003"
    env_file:
      - ./api/.env
    environment:
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: forum_db
    container_name: forum-api
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  forum-frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    container_name: forum-frontend
    depends_on:
      forum-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
